name: Build desktop packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os-name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-name: macos
            runner: macos-14
            artifact-name: PO-Label-Request-App-macOS
            package-path: PO-Label-Request-App-macOS.zip
            package-folder: dist/PO Label Request App macOS
          - os-name: windows
            runner: windows-latest
            artifact-name: PO-Label-Request-App-Windows
            package-path: PO-Label-Request-App-Windows.zip
            package-folder: dist/PO Label Request App

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Create example workbook
        run: python scripts/create_example_input.py

      - name: Build desktop package
        run: python scripts/build_desktop.py

      - name: Zip macOS app
        if: matrix.os-name == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent "${{ matrix.package-folder }}" "${{ matrix.package-path }}"

      - name: Zip Windows app
        if: matrix.os-name == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.package-folder }}" -DestinationPath "${{ matrix.package-path }}" -Force

      - name: Upload zipped package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.package-path }}
          if-no-files-found: error

  release:
    name: Publish latest desktop release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-desktop-build
          name: Latest Desktop Build
          body: |
            Download the correct package for your operating system.

            Windows: PO-Label-Request-App-Windows.zip
            macOS: PO-Label-Request-App-macOS.zip
          artifacts: release-assets/*.zip
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
